<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Publish Article</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-form{max-width:780px;margin:2rem auto;padding:1rem;border:1px solid #eef2f7;border-radius:8px;background:#fff}
    .field{margin-bottom:0.75rem}
    label{display:block;font-weight:600;margin-bottom:.25rem}
    input[type=text], input[type=date], textarea, select{width:100%;padding:.5rem;border:1px solid #e6e9ef;border-radius:6px}
    textarea{min-height:140px}
    .actions{display:flex;gap:.5rem;align-items:center;margin-top:.5rem}
    .muted{color:var(--muted);font-size:.9rem}
    .response{margin-top:.5rem}
  </style>
</head>
<body>
  <div class="container">
    <h1>後台 - 發佈文章</h1>
    <div id="adminArea" style="display:none">
    <div class="admin-form">
      <div class="field">
        <label for="repo">Repository（owner/repo）</label>
        <input id="repo" type="text" value="Sofiayan86/journey">
      </div>

      <div class="field">
        <label for="workflow">Workflow file name</label>
        <input id="workflow" type="text" value="publish-article.yml">
      </div>

      <div class="field">
        <label for="branch">Branch</label>
        <input id="branch" type="text" value="main">
      </div>

      <div class="field">
        <label for="pat">GitHub PAT (only for this browser session)</label>
          <input id="pat" type="text" autocomplete="off">
          <div style="margin-top:.5rem;display:flex;gap:.5rem;align-items:center">
            <a id="ghSignIn" href="/auth/start" style="background:#24292e;color:#fff;padding:.4rem .6rem;border-radius:6px;text-decoration:none">Sign in with GitHub</a>
            <span style="color:var(--muted);font-size:.9rem">或貼上 PAT</span>
          </div>
        <div class="muted">請使用具最小權限的 PAT（repo + workflow），並勿在公用設備輸入。</div>
      </div>

      <hr>

      <div class="field">
        <label for="title">Title</label>
        <input id="title" type="text" placeholder="文章標題">
      </div>

      <div class="field"><label for="date">Date</label><input id="date" type="date"></div>

      <div class="field"><label for="slug">Slug (檔名，不含 .html)</label><input id="slug" type="text" placeholder="taipei-day-2025-10"></div>

      <div class="field"><label for="summary">Summary</label><textarea id="summary"></textarea></div>

      <div class="field"><label for="coverImage">Cover Image (path)</label><input id="coverImage" type="text" placeholder="/images/your-cover.jpg"></div>

      <div class="field"><label for="gpxFile">GPX File (optional)</label><input id="gpxFile" type="text" placeholder="/gpx/your-track.gpx"></div>

      <div class="field"><label for="location">Location (lat,lng)</label><input id="location" type="text" placeholder="25.033964,121.564468"></div>

      <div class="field"><label for="tags">Tags (comma separated)</label><input id="tags" type="text" placeholder="台灣,城市漫步"></div>

      <div class="field"><label for="content">HTML content</label><textarea id="content" placeholder="<p>文章內文...</p>"></textarea></div>
  <div class="field"><label><input id="contentIsMarkdown" type="checkbox"> 內容為 Markdown (若勾選，將在 workflow 中轉換為 HTML)</label></div>

      <div class="actions">
        <button id="publish">觸發發布</button>
          <button id="preview" type="button">預覽</button>
        <div id="status" class="response muted"></div>
      </div>
    </div>
    </div>
    </div>

    <section class="container" style="max-width:980px;margin-top:1.25rem;">
      <h2>預覽</h2>
      <iframe id="previewFrame" style="width:100%;height:500px;border:1px solid #e6e9ef;border-radius:6px"></iframe>
    </section>
  </div>

  <!-- Simple admin lock overlay -->
  <div id="lockOverlay" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);z-index:9999">
    <div style="background:#fff;padding:1.25rem;border-radius:8px;max-width:420px;width:100%;box-shadow:0 6px 20px rgba(0,0,0,0.2)">
      <h3 id="lockTitle">解鎖後台</h3>
      <div id="lockMsg" style="margin-bottom:.5rem;color:#444">請輸入管理密碼以繼續。</div>
      <input id="lockInput" type="password" placeholder="請輸入密碼" style="width:100%;padding:.5rem;margin-bottom:.5rem;border:1px solid #e6e9ef;border-radius:6px">
      <div style="display:flex;gap:.5rem;justify-content:flex-end">
        <button id="lockCancel" style="background:#f3f4f6;border:1px solid #e6e9ef;padding:.5rem .75rem;border-radius:6px">取消</button>
        <button id="lockAction" style="background:#111827;color:#fff;border:none;padding:.5rem .75rem;border-radius:6px">解鎖</button>
      </div>
      <div id="lockHelp" style="margin-top:.75rem;color:var(--muted);font-size:.9rem">首次使用會要求你設定密碼（密碼會以雜湊儲存在瀏覽器），若要移除請在瀏覽器的開發者工具中清除 localStorage 的 <code>admin_pw_hash</code>。</div>
    </div>
  </div>

  <script type="module" src="scripts/admin.js"></script>
</body>
</html>
